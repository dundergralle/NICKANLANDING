<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a2a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Luna</title>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --board:   #1e2d1e;
    --board2:  #243024;
    --chalk:   #f0ede6;
    --chalk2:  #d8d4cc;
    --pink-chalk: #f4b8c8;
    --yellow-chalk: #f5e090;
    --green-chalk: #90d4a0;
    --red-chalk: #f07878;
    --frame:   #6b4c2a;
    --frame2:  #8a6238;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  body {
    min-height: 100dvh;
    font-family: 'Raleway', sans-serif;
    background: var(--board);
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
  }

  /* ---- CHALKBOARD BG ---- */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    /* Worn chalkboard texture via layered gradients */
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.012) 40px,
        rgba(255,255,255,0.012) 41px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(255,255,255,0.008) 60px,
        rgba(255,255,255,0.008) 61px
      ),
      radial-gradient(ellipse 100% 80% at 50% 50%, #243424 0%, #1a281a 60%, #141e14 100%);
  }

  /* Chalk smudge marks */
  .smudge {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    background: rgba(240,237,230,0.04);
    filter: blur(18px);
  }

  /* Wooden frame border */
  .frame-top, .frame-bottom, .frame-left, .frame-right {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    background: linear-gradient(180deg, var(--frame2), var(--frame), #5a3c1e, var(--frame));
  }
  .frame-top    { top:0; left:0; right:0; height:14px; background: linear-gradient(180deg, #a07840, var(--frame), #5a3c1e); }
  .frame-bottom { bottom:0; left:0; right:0; height:14px; background: linear-gradient(0deg, #a07840, var(--frame), #5a3c1e); }
  .frame-left   { top:0; bottom:0; left:0; width:12px; background: linear-gradient(90deg, #a07840, var(--frame), #5a3c1e); }
  .frame-right  { top:0; bottom:0; right:0; width:12px; background: linear-gradient(270deg, #a07840, var(--frame), #5a3c1e); }

  /* Chalk dust particles */
  .chalk-dust {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .dust {
    position: absolute;
    border-radius: 50%;
    background: rgba(240,237,230,0.55);
    animation: dust-drift linear infinite;
  }
  @keyframes dust-drift {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-60px) translateX(20px); }
  }

  /* ---- CONTENT ---- */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2.5rem 1.5rem;
    padding-top: max(2.5rem, env(safe-area-inset-top));
    padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
  }

  /* ---- AVATAR ---- */
  .avatar-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    margin-bottom: 1.4rem;
  }

  /* Chalk-drawn circle ring */
  .avatar-ring-svg {
    position: absolute;
    inset: -8px;
    width: calc(100% + 16px);
    height: calc(100% + 16px);
    z-index: 1;
    animation: ring-spin 20s linear infinite;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }

  .avatar-inner {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(240,237,230,0.5);
  }

  .avatar {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.05) saturate(0.9);
  }

  /* ---- NAME — chalk handwriting style ---- */
  h1 {
    font-family: 'Architects Daughter', cursive;
    font-weight: 400;
    font-size: 3.4rem;
    color: var(--chalk);
    letter-spacing: 0.05em;
    margin-bottom: 0rem;
    text-align: center;
    text-shadow:
      0 0 20px rgba(240,237,230,0.25),
      1px 1px 0 rgba(0,0,0,0.4);
  }

  /* Underline — drawn chalk line */
  .chalk-underline {
    width: 120px;
    height: 8px;
    margin: 0.1rem auto 0.5rem;
  }

  .name-sub {
    font-family: 'Raleway', sans-serif;
    font-weight: 400;
    font-size: 0.78rem;
    color: var(--pink-chalk);
    margin-bottom: 1rem;
    text-align: center;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.9;
  }

  /* ---- MATH/NOTES DOODLES on board ---- */
  .board-doodles {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0.22;
  }

  /* ---- LOCATION ---- */
  .location-text {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    margin-bottom: 1.8rem;
    letter-spacing: 0.05em;
    border-bottom: 1px dashed rgba(240,237,230,0.25);
    padding-bottom: 2px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-chalk);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green-chalk);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ---- BUTTONS ---- */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    width: 100%;
    max-width: 300px;
  }

  .btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 52px;
    padding: 0 1.2rem;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--chalk);
    font-family: 'Raleway', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-align: center;
    text-decoration: none;
    /* Chalk-drawn border via SVG-like box-shadow */
    border: 2px solid rgba(240,237,230,0.35);
    border-radius: 3px;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
    transition: transform 0.12s ease, background 0.15s ease;
    text-shadow: 0 0 8px rgba(240,237,230,0.2);
  }

  /* Chalk shimmer */
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.4s;
    pointer-events: none;
  }

  /* Primary — pink chalk */
  .btn-primary {
    background: rgba(244,184,200,0.15);
    border-color: rgba(244,184,200,0.6);
    color: var(--pink-chalk);
    text-shadow: 0 0 10px rgba(244,184,200,0.4);
    box-shadow: 0 0 12px rgba(244,184,200,0.08), inset 0 0 20px rgba(244,184,200,0.04);
    animation: chalk-glow 3s ease-in-out infinite;
  }
  @keyframes chalk-glow {
    0%, 100% { box-shadow: 0 0 10px rgba(244,184,200,0.08), inset 0 0 20px rgba(244,184,200,0.03); }
    50%       { box-shadow: 0 0 20px rgba(244,184,200,0.16), inset 0 0 30px rgba(244,184,200,0.07); }
  }

  /* Second button — yellow chalk */
  .btn-second {
    border-color: rgba(245,224,144,0.5);
    color: var(--yellow-chalk);
    text-shadow: 0 0 10px rgba(245,224,144,0.3);
  }

  @media (hover: hover) {
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn:hover::after { left: 140%; }
  }
  .btn:active { transform: scale(0.97); }

  /* ---- BTN TAG ---- */
  .btn-tag-wrap { position: relative; }
  .btn-tag {
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%) rotate(-8deg);
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.9rem;
    color: var(--yellow-chalk);
    pointer-events: none;
    white-space: nowrap;
    animation: tag-bounce 1.8s ease-in-out infinite;
    font-family: 'Architects Daughter', cursive;
  }
  .btn-tag svg { width: 24px; height: 18px; transform: scaleX(-1); }
  @keyframes tag-bounce {
    0%, 100% { transform: translateY(-50%) rotate(-8deg) scale(1); }
    50%       { transform: translateY(-50%) rotate(-8deg) scale(1.1); }
  }

  /* ---- FOOTER ---- */
  .footer-deco {
    margin-top: 1.8rem;
    font-family: 'Architects Daughter', cursive;
    font-size: 0.8rem;
    color: rgba(240,237,230,0.3);
    letter-spacing: 0.1em;
    text-align: center;
  }
</style>
</head>
<body>

<script>
// Chalk dust particles
(function() {
  var c = document.getElementById('dust');
  for (var i = 0; i < 22; i++) {
    var d = document.createElement('div');
    d.className = 'dust';
    var s = Math.random() * 2.5 + 1;
    d.style.cssText = [
      'left:' + (Math.random() * 100) + '%',
      'bottom:' + (Math.random() * 30) + 'px',
      'width:' + s + 'px',
      'height:' + s + 'px',
      'opacity:0',
      'animation-duration:' + (Math.random() * 10 + 8) + 's',
      'animation-delay:' + (Math.random() * 10) + 's'
    ].join(';');
    c.appendChild(d);
  }
})();

// Geolocation
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(d) {
      var v = extract(d); if (!v || v.trim().length < 2) throw new Error('no city'); return v;
    });
  }
  get('https://ipinfo.io/json', function(d) { return d && d.city; })
    .catch(function() { return get('https://ip-api.com/json/?fields=city,regionName', function(d) { return d && (d.city || d.regionName); }); })
    .catch(function() { return get('https://ipapi.co/json/', function(d) { return d && (d.city || d.region); }); })
    .then(function(city) { setCity(city); })
    .catch(function() { setCity(null); });
})();
</script>
